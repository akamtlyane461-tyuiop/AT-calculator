<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Neon Glassmorphic Calculator</title>
    <style>
        /* Base Styling & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #090514 100%);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Decorative Neon Ambient Blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before {
            background: #06b6d4;
            top: 15%;
            left: 20%;
            animation: float 8s ease-in-out infinite alternate;
        }
        body::after {
            background: #d946ef;
            bottom: 15%;
            right: 20%;
            animation: float 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        /* Calculator Container (Glassmorphism) */
        .calculator-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(6, 182, 212, 0.05);
        }

        /* Top Bar & Toggle Switch */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
            width: 100px;
            height: 34px;
        }

        .toggle-label {
            flex: 1;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s ease;
            z-index: 2;
        }

        .toggle-label.active {
            color: #ffffff;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 46px;
            height: 26px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border-radius: 20px;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
            z-index: 1;
        }

        .lang-ku .toggle-slider {
            transform: translateX(48px);
            background: linear-gradient(135deg, #d946ef, #8b5cf6);
            box-shadow: 0 0 10px rgba(217, 70, 239, 0.4);
        }

        /* Screen/Display */
        .display {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        .history-expr {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 6px;
            min-height: 24px;
            transition: color 0.3s;
        }

        .current-val {
            font-size: 2.3rem;
            font-weight: 300;
            color: #ffffff;
            transition: font-size 0.1s;
        }

        /* Keyboard Grid Layout */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Buttons Styling */
        .btn {
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            font-size: 1.35rem;
            font-weight: 500;
            height: 64px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Specialized Action Buttons */
        .btn-utility {
            background: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .btn-utility:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-operator {
            background: rgba(6, 182, 212, 0.1);
            color: #22d3ee;
            font-size: 1.5rem;
            font-weight: 600;
            border-color: rgba(6, 182, 212, 0.15);
        }

        .btn-operator:hover {
            background: #06b6d4;
            color: #090514;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .btn-equals {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 600;
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: linear-gradient(135deg, #22d3ee, #60a5fa);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        /* Mode-Specific Accents for Kurdish Layout */
        .lang-ku .btn-operator {
            background: rgba(217, 70, 239, 0.1);
            color: #f472b6;
            border-color: rgba(217, 70, 239, 0.15);
        }

        .lang-ku .btn-operator:hover {
            background: #d946ef;
            color: #090514;
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.4);
        }

        .lang-ku .btn-equals {
            background: linear-gradient(135deg, #d946ef, #8b5cf6);
        }

        .lang-ku .btn-equals:hover {
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            box-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
        }

        /* Directional alignment rule based on UI system */
        .lang-ku .display {
            align-items: flex-start; /* Optional: adjust reading flow directionality */
        }
    </style>
</head>
<body>

    <div class="calculator-container" id="calcWrapper">
        <!-- Top Controls Layout -->
        <div class="top-bar">
            <div class="brand-title">Bilingual Calc</div>
            <div class="toggle-container" id="langToggle" onclick="toggleLanguage()">
                <div class="toggle-slider"></div>
                <div class="toggle-label active" id="lblEn">EN</div>
                <div class="toggle-label" id="lblKu">کوردی</div>
            </div>
        </div>

        <!-- Dynamic Output Viewscreen -->
        <div class="display">
            <div class="history-expr" id="historyView"></div>
            <div class="current-val" id="mainView">0</div>
        </div>

        <!-- Input Interactive Deck -->
        <div class="keypad">
            <button class="btn btn-utility" onclick="handleClear()">AC</button>
            <button class="btn btn-utility" onclick="handleBackspace()">⌫</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

            <button class="btn" data-num="7" onclick="appendNum('7')">7</button>
            <button class="btn" data-num="8" onclick="appendNum('8')">8</button>
            <button class="btn" data-num="9" onclick="appendNum('9')">9</button>
            <button class="btn window-op btn-operator" onclick="appendOperator('-')">-</button>

            <button class="btn" data-num="4" onclick="appendNum('4')">4</button>
            <button class="btn" data-num="5" onclick="appendNum('5')">5</button>
            <button class="btn" data-num="6" onclick="appendNum('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn" data-num="1" onclick="appendNum('1')">1</button>
            <button class="btn" data-num="2" onclick="appendNum('2')">2</button>
            <button class="btn" data-num="3" onclick="appendNum('3')">3</button>
            <button class="btn btn-equals" onclick="computeResult()">=</button>

            <button class="btn" data-num="0" onclick="appendNum('0')" style="grid-column: span 2;">0</button>
            <button class="btn" data-num="." onclick="appendDecimal()">.</button>
        </div>
    </div>

    <script>
        // System Translation Dictionaries
        const enToKuDigits = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩','/':'÷','*':'×','-':'-','+':'+','\\.':','};
        const kuToEnDigits = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9','÷':'/','×':'*','-':'-','+':'+',',':'.'};

        // State Engines
        let currentLanguage = 'en'; // Mode options: 'en' or 'ku'
        let memoryInputStr = '0';   // Primary engine operations tracked always in standard clean numeric representation
        let activeHistoryStr = '';
        let shouldResetOnNextInput = false;

        // Visual Interceptor Transformers
        function localizeString(str, language) {
            if (!str) return '';
            let targetStr = str;
            if (language === 'ku') {
                return targetStr.split('').map(char => enToKuDigits[char] || char).join('');
            } else {
                return targetStr;
            }
        }

        // Display Render Synchronization
        function updateDisplay() {
            const mainViewEl = document.getElementById('mainView');
            const historyViewEl = document.getElementById('historyView');
            
            mainViewEl.textContent = localizeString(memoryInputStr, currentLanguage);
            historyViewEl.textContent = localizeString(activeHistoryStr, currentLanguage);

            // Dynamic Font Scaler adjustments for overflowing calculation sizes
            if (memoryInputStr.length > 10) {
                mainViewEl.style.fontSize = "1.6rem";
            } else if (memoryInputStr.length > 7) {
                mainViewEl.style.fontSize = "1.9rem";
            } else {
                mainViewEl.style.fontSize = "2.3rem";
            }
        }

        // Switch Action UI Engine
        function toggleLanguage() {
            currentLanguage = currentLanguage === 'en' ? 'ku' : 'en';
            
            const wrapper = document.getElementById('calcWrapper');
            const lblEn = document.getElementById('lblEn');
            const lblKu = document.getElementById('lblKu');

            if (currentLanguage === 'ku') {
                wrapper.classList.add('lang-ku');
                lblKu.classList.add('active');
                lblEn.classList.remove('active');
            } else {
                wrapper.classList.remove('lang-ku');
                lblEn.classList.add('active');
                lblKu.classList.remove('active');
            }

            // Transform individual visible component values inside the DOM Matrix element keys
            document.querySelectorAll('.keypad .btn[data-num]').forEach(button => {
                const numericKey = button.getAttribute('data-num');
                button.textContent = localizeString(numericKey, currentLanguage);
            });

            updateDisplay();
        }

        // Functional Core Subroutines
        function appendNum(numString) {
            if (memoryInputStr === '0' || shouldResetOnNextInput || memoryInputStr === 'Error') {
                memoryInputStr = numString;
                shouldResetOnNextInput = false;
            } else {
                memoryInputStr += numString;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetOnNextInput || memoryInputStr === 'Error') {
                memoryInputStr = '0.';
                shouldResetOnNextInput = false;
                updateDisplay();
                return;
            }
            if (!memoryInputStr.includes('.')) {
                memoryInputStr += '.';
            }
            updateDisplay();
        }

        function appendOperator(operatorSymbol) {
            if (memoryInputStr === 'Error') return;
            
            // If output calculation was recently finished, allow seamless operation continuation chaining
            if (shouldResetOnNextInput) {
                activeHistoryStr = memoryInputStr + " " + operatorSymbol + " ";
                shouldResetOnNextInput = false;
            } else {
                activeHistoryStr += memoryInputStr + " " + operatorSymbol + " ";
            }
            memoryInputStr = '0';
            updateDisplay();
        }

        function handleClear() {
            memoryInputStr = '0';
            activeHistoryStr = '';
            shouldResetOnNextInput = false;
            updateDisplay();
        }

        function handleBackspace() {
            if (shouldResetOnNextInput || memoryInputStr === 'Error') {
                handleClear();
                return;
            }
            if (memoryInputStr.length > 1) {
                memoryInputStr = memoryInputStr.slice(0, -1);
            } else {
                memoryInputStr = '0';
            }
            updateDisplay();
        }

        function computeResult() {
            if (activeHistoryStr === '' || shouldResetOnNextInput) return;
            
            let expression = activeHistoryStr + memoryInputStr;
            
            // Critical Safety Checks against potential unsafe executions
            try {
                // Intercept edge case arithmetic division exceptions directly
                if (/\/ 0(?!\d)/.test(expression)) {
                    memoryInputStr = 'Error';
                    activeHistoryStr = '';
                    shouldResetOnNextInput = true;
                    updateDisplay();
                    return;
                }

                // Math execution sandbox safely computing clean string parsed configurations
                let evaluationResult = Function(`"use strict"; return (${expression})`)();
                
                // Format decimal solutions cleanly down to maximum 8 places to mitigate precision noise
                if (evaluationResult !== undefined) {
                    if (evaluationResult % 1 !== 0) {
                        evaluationResult = parseFloat(evaluationResult.toFixed(8));
                    }
                    activeHistoryStr = '';
                    memoryInputStr = String(evaluationResult);
                    shouldResetOnNextInput = true;
                }
            } catch (error) {
                memoryInputStr = 'Error';
                activeHistoryStr = '';
                shouldResetOnNextInput = true;
            }
            updateDisplay();
        }

        // Initialize state view defaults at load runtime
        toggleLanguage(); // Syncs buttons configuration to target base default
        toggleLanguage(); // Restores base execution configuration
    </script>
</body>
              </html>
